<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Battleship</title>
    </head>
    <body>
        <div class="main">
            <h1>BATTLESHIP</h1>
            <div class="game-box home">
                <p class="about">
                    A classic 1v1 board game. Each player will try to guess other player's ship by clicking on their square boxes on board. In this game you play as Player 1 against Player 2 (computer). First player to make all of opponent's ships sink wins. Good luck!
                </p>
                <button class="start-game-btn">Start game</button>
            </div>
        </div>
    </body>
</html>
